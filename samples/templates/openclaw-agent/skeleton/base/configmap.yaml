apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-${{ values.name }}-config
  namespace: ${{ values.namespace }}
data:
  openclaw.json: |
    {
      "gateway": {
        "port": 18789,
        "bind": "lan",
        "mode": "local",
        "tools": {
          "allow": ["claude_code_resume", "claude_code_sessions", "exec"]
        }
      },
      "models": {
        "providers": {
{%- if values.provider == "claude-subscription" %}
          "anthropic": {
            "baseUrl": "https://api.anthropic.com/v1",
            "api": "openai-completions",
            "apiKey": "bridge-managed",
            "models": [
              {"id": "${{ values.modelName | default('claude-sonnet-4-6', true) }}", "name": "${{ values.modelName | default('claude-sonnet-4-6', true) }}"}
            ]
          }
{%- elif values.provider == "smr" %}
          "smr": {
            "baseUrl": "http://smr-router-${{ values.routerRef }}.${{ values.namespace }}.svc.cluster.local",
            "api": "openai-completions",
            "apiKey": "${SMR_API_KEY}",
            "models": [{"id": "auto", "name": "auto"}]
          }
{%- elif values.provider == "openai" %}
          "openai": {
            "baseUrl": "https://api.openai.com/v1",
            "api": "openai-completions",
            "apiKey": "${OPENAI_API_KEY}",
            "models": [{"id": "${{ values.modelName | default('gpt-4o-mini', true) }}", "name": "${{ values.modelName | default('gpt-4o-mini', true) }}"}]
          }
{%- elif values.provider == "anthropic" %}
          "anthropic": {
            "baseUrl": "https://api.anthropic.com/v1",
            "api": "openai-completions",
            "apiKey": "${ANTHROPIC_API_KEY}",
            "models": [{"id": "${{ values.modelName | default('claude-sonnet-4-20250514', true) }}", "name": "${{ values.modelName | default('claude-sonnet-4-20250514', true) }}"}]
          }
{%- endif %}
        }
      },
      "agents": {
        "defaults": {
          "model": {
{%- if values.provider == "claude-subscription" %}
            "primary": "anthropic/${{ values.modelName | default('claude-sonnet-4-6', true) }}"
{%- elif values.provider == "smr" %}
            "primary": "${{ values.modelName | default('auto', true) }}"
{%- elif values.provider == "openai" %}
            "primary": "openai/${{ values.modelName | default('gpt-4o-mini', true) }}"
{%- elif values.provider == "anthropic" %}
            "primary": "anthropic/${{ values.modelName | default('claude-sonnet-4-20250514', true) }}"
{%- endif %}
          }
        }
      },
      "tools": {
        "allow": ["exec", "claude_code_resume", "claude_code_sessions", "group:plugins"]
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto",
        "restart": true,
        "ownerDisplay": "raw"
      },
      "plugins": {
        "enabled": true
      }
    }
  IDENTITY.md: |
    ---
    name: ${{ values.displayName }}
    emoji: ${{ values.emoji }}
    creature: AI Agent
    vibe: professional and helpful
    ---

    # ${{ values.displayName }}

    I am ${{ values.displayName }}, an AI agent managed by Agent Office.
  SOUL.md: |
    ---
    name: ${{ values.displayName }} Soul
    ---

    # Core Directive

    ${{ values.systemPrompt | indent(4) }}

    # Values

    - Be genuinely helpful, not performatively helpful
    - Be concise and direct — respect the user's time
    - When uncertain, say so rather than guessing
    - Request permission before taking destructive or irreversible actions
    - Respect privacy and handle data carefully
  USER.md: |
    ---
    name: User
    ---

    # User Profile

    - **Name**: (not yet known)
    - **What to call them**: (ask on first interaction)

    # Context

    This agent was created via Agent Office on OpenShift.
    The user interacts through the Agent Office chat interface.
  TOOLS.md: |
    ---
    name: Tool Guidance
    ---

    # Available Tools
{%- for tool in values.tools %}
    - **${{ tool }}**
{%- endfor %}
  SKILL_claude-code.md: |
    ---
    name: claude-code
    description: Use Claude Code CLI for complex reasoning, coding, shell commands, and multi-step investigations
    metadata: { "openclaw": { "emoji": "🧠", "requires": { "bins": ["claude"] } } }
    ---

    # Claude Code Skill — Powerful Reasoning & Coding via Claude Code CLI

    You have access to **Claude Code**, a full-featured AI coding assistant running as a CLI tool. It can read/write files, run shell commands, search codebases, and perform multi-step investigations — all through your Max subscription (no per-request API cost).

    ## When to Use Claude Code

    **Use it for:**
    - Multi-step coding tasks (write code, run tests, fix errors, iterate)
    - Investigating complex issues (read logs, search code, trace execution paths)
    - Shell command sequences that need reasoning between steps
    - Refactoring, debugging, or reviewing code
    - Any task that benefits from persistent context across multiple interactions

    **Don't use it for:**
    - Simple questions you can answer from your own knowledge
    - Single-command operations (just use `exec` directly)
    - Quick file reads (use your own tools)
    - Tasks where the user wants instant responses (Claude Code adds latency)

    ## Tools Reference

    ### `claude_code_resume` (Primary — use this by default)

    ```
    claude_code_resume({
      prompt: "Your prompt here",
      taskLabel: "descriptive-label",
      agentId: "your-agent-id"
    })
    ```

    **Always provide a `taskLabel`** — it's how sessions are tracked and resumed.

    ### `claude_code_query` (Explicit control)

    Start a new session or resume by specific session ID.

    ### `claude_code_sessions`

    List your sessions with status, cost, and message count.

    ### `claude_code_fork`

    Branch from an existing session to explore an alternative approach.

    ### `claude_code_kill`

    Mark a session as done when finished.

    ## Session Decision Tree

    1. **Continuing existing task?** → `claude_code_resume` with same `taskLabel`
    2. **New task?** → `claude_code_resume` with new `taskLabel`
    3. **Different approach?** → `claude_code_fork` from current session
    4. **Task done?** → `claude_code_kill` to clean up

    ## How to Relay Results

    - **Summarize** key findings — don't dump raw output
    - **Quote specific code** if the user needs to see it
    - **Report the sessionId** if the user might want to continue later
    - **Mention cost** only if significant (> $0.10)
  AGENTS.md: |
    ---
    name: ${{ values.name }}
    ---

    # ${{ values.displayName }}

    ${{ values.systemPrompt | indent(4) }}

    ## Claude Code

    Use your built-in model as the first responder for every conversation.
    Use `claude_code_resume` for technical work that needs deeper reasoning,
    code generation, debugging, or multi-step execution.

    If the user asks you to show, prove, demonstrate, or verify Claude Code
    usage, you must call `claude_code_resume` in that turn.

    For any Red Hat Developer Hub, Backstage, catalog, scaffolder, or template
    task, use the shared `developer-hub` skill as the source of truth for
    endpoints and API paths. Do not guess Developer Hub hostnames from memory.
