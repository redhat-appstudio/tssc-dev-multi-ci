apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-${{ values.name }}
  namespace: ${{ values.namespace }}
  annotations:
    tad.gitops.set/image: ".spec.template.spec.containers[0].image"
    tad.gitops.get/image: ".spec.template.spec.containers[0].image"
spec:
  replicas: 1
  selector:
    matchLabels:
      agentoffice.ai/agent: ${{ values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.name }}
        agentoffice.ai/agent: ${{ values.name }}
    spec:
      initContainers:
        - name: init-config
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              cp /config/openclaw.json /workspace/openclaw.json
              mkdir -p /workspace/workspace
              for f in AGENTS.md IDENTITY.md SOUL.md USER.md TOOLS.md; do
                if [ ! -f "/workspace/workspace/$f" ]; then
                  cp "/config/$f" "/workspace/workspace/$f"
                fi
              done
              # Install skills from ConfigMap (SKILL_<name>.md → skills/<name>/SKILL.md)
              for f in /config/SKILL_*.md; do
                [ -f "$f" ] || continue
                skill_name=$(basename "$f" .md | sed 's/^SKILL_//')
                mkdir -p "/workspace/workspace/skills/$skill_name"
                cp "$f" "/workspace/workspace/skills/$skill_name/SKILL.md"
              done
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: workspace
              mountPath: /workspace
      containers:
        - name: openclaw
          image: quay.io/aicatalyst/openclaw:latest
          imagePullPolicy: Always
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          envFrom:
            - secretRef:
                name: agent-${{ values.name }}-secret
          volumeMounts:
            - name: workspace
              mountPath: /home/node/.openclaw
            - name: claude-state
              mountPath: /home/node/.claude
            - name: dshm
              mountPath: /dev/shm
{%- if values.provider == "claude-subscription" %}
            - name: claude-credentials
              mountPath: /home/node/.claude/.credentials.json
              subPath: credentials.json
              readOnly: true
{%- endif %}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: agent-${{ values.name }}-config
        - name: workspace
          persistentVolumeClaim:
            claimName: agent-${{ values.name }}-workspace
        - name: claude-state
          persistentVolumeClaim:
            claimName: agent-${{ values.name }}-claude
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
{%- if values.provider == "claude-subscription" %}
        - name: claude-credentials
          secret:
            secretName: claude-subscription-credentials
{%- endif %}
