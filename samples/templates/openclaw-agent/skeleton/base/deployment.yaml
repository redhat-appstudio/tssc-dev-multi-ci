apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-${{ values.name }}
  namespace: ${{ values.namespace }}
  annotations:
    tad.gitops.set/image: ".spec.template.spec.containers[0].image"
    tad.gitops.get/image: ".spec.template.spec.containers[0].image"
spec:
  replicas: 1
  selector:
    matchLabels:
      agentoffice.ai/agent: ${{ values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.name }}
        agentoffice.ai/agent: ${{ values.name }}
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      initContainers:
        - name: init-config
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          envFrom:
            - secretRef:
                name: agent-${{ values.name }}-secret
          command:
            - /bin/sh
            - -c
            - |
              cp /config/openclaw.json /workspace/openclaw.json
              # Substitute all secret env vars into openclaw.json
              for var in OPENAI_API_KEY ANTHROPIC_API_KEY SMR_API_KEY OPENCLAW_GATEWAY_TOKEN; do
                val=$(eval echo \$$var)
                if [ -n "$val" ]; then
                  sed -i "s|\${${var}}|${val}|g" /workspace/openclaw.json
                fi
              done
              mkdir -p /workspace/workspace
              # Always overwrite config-driven files
              for f in AGENTS.md IDENTITY.md SOUL.md TOOLS.md; do
                cp "/config/$f" "/workspace/workspace/$f"
              done
              # Only create USER.md if missing
              if [ ! -f "/workspace/workspace/USER.md" ]; then
                cp "/config/USER.md" "/workspace/workspace/USER.md"
              fi
              # Install skills from agent config and shared office skills
              for f in /config/SKILL_*.md /shared-skills/SKILL_*.md; do
                [ -f "$f" ] || continue
                skill_name=$(basename "$f" .md | sed 's/^SKILL_//')
                mkdir -p "/workspace/workspace/skills/$skill_name"
                cp "$f" "/workspace/workspace/skills/$skill_name/SKILL.md"
              done
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: shared-skills
              mountPath: /shared-skills
              readOnly: true
            - name: workspace
              mountPath: /workspace
      containers:
        - name: openclaw
          image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/openclaw@sha256:8d8b5c0379d01a5907110b37d942e7e985cd9538112f8cac175e91dea015dc06
          imagePullPolicy: Always
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: CODEX_HOME
              value: "/home/node/.codex"
          envFrom:
            - secretRef:
                name: agent-${{ values.name }}-secret
          volumeMounts:
            - name: workspace
              mountPath: /home/node/.openclaw
            - name: codex-credentials
              mountPath: /home/node/.codex
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: agent-${{ values.name }}-config
        - name: workspace
          persistentVolumeClaim:
            claimName: agent-${{ values.name }}-workspace
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: codex-credentials
          secret:
            secretName: codex-subscription-credentials
        - name: shared-skills
          configMap:
            name: agent-office-shared-skills
            optional: true
