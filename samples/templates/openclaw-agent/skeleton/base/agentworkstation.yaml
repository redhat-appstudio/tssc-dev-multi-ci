apiVersion: agentoffice.ai/v1alpha1
kind: AgentWorkstation
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/agent: ${{ values.name }}
spec:
  displayName: ${{ values.displayName }}
  emoji: "${{ values.emoji }}"
  description: ${{ values.description }}
  systemPrompt: |
    ${{ values.systemPrompt | replace('\n', '\n    ') }}
  image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/openclaw@sha256:8d8b5c0379d01a5907110b37d942e7e985cd9538112f8cac175e91dea015dc06
  model:
    provider: ${{ values.provider }}
{%- if values.provider == "openai-codex" %}
    modelName: ${{ values.modelName | default("gpt-5.4", true) }}
{%- elif values.provider == "smr" %}
    modelName: ${{ values.modelName | default("auto", true) }}
{%- elif values.provider == "openai" %}
    modelName: ${{ values.modelName | default("gpt-4o-mini", true) }}
{%- elif values.provider == "anthropic" %}
    modelName: ${{ values.modelName | default("claude-sonnet-4-20250514", true) }}
{%- endif %}
{%- if values.provider == "smr" and values.routerRef %}
    modelRouterRef: ${{ values.routerRef }}
{%- endif %}
  tools:
    allow:
{%- for tool in values.tools %}
      - ${{ tool }}
{%- endfor %}
