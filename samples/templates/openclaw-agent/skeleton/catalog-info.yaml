apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  title: ${{ values.displayName }}
  description: ${{ values.description }}
  annotations:
    argocd/app-name: ${{ values.name }}-agent
    backstage.io/kubernetes-id: ${{ values.name }}
  tags:
    - ai
    - agent
    - openclaw
spec:
  type: service
  lifecycle: production
  owner: ${{ values.owner }}
